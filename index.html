<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%237c3aed'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white'%3E🚀%3C/text%3E%3C/svg%3E">
<title>Nova Voice</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.05);
    --surface-hover: rgba(255,255,255,0.1);
    --primary: #7c3aed;
    --primary-light: #a78bfa;
    --primary-glow: rgba(124,58,237,0.4);
    --text: #e4e4e7;
    --text-dim: #71717a;
    --user-bubble: #1e1b4b;
    --nova-bubble: rgba(124,58,237,0.15);
    --radius: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden; font-family: var(--font);
    background: var(--bg); color: var(--text);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .app {
    display: flex; flex-direction: column; height: 100%;
    max-width: 480px; margin: 0 auto;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    position: relative;
  }

  /* Animated background */
  .bg-glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .bg-glow::before {
    content: ''; position: absolute;
    width: 600px; height: 600px;
    top: -200px; right: -200px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    animation: float 8s ease-in-out infinite;
  }
  .bg-glow::after {
    content: ''; position: absolute;
    width: 400px; height: 400px;
    bottom: -100px; left: -100px;
    background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
    animation: float 12s ease-in-out infinite reverse;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -30px) scale(1.05); }
  }

  .app > * { position: relative; z-index: 1; }

  /* Header */
  .header {
    padding: 20px 20px 12px; text-align: center;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 18px; font-weight: 600;
    background: linear-gradient(135deg, var(--primary-light), #c4b5fd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .status {
    font-size: 12px; color: var(--text-dim); margin-top: 2px;
    transition: color 0.3s;
  }
  .header .status.listening { color: #34d399; }
  .header .status.speaking { color: #fbbf24; }
  .header .status.thinking { color: var(--primary-light); }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto; padding: 8px 16px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .msg {
    margin-bottom: 12px; display: flex;
    animation: msgIn 0.35s ease-out;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.user { justify-content: flex-end; }
  .msg.nova { justify-content: flex-start; }

  .bubble {
    max-width: 85%; padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 15px; line-height: 1.5;
    word-wrap: break-word;
  }
  .user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,58,237,0.2);
    border-bottom-right-radius: 4px;
  }
  .nova .bubble {
    background: var(--nova-bubble);
    border: 1px solid rgba(124,58,237,0.1);
    border-bottom-left-radius: 4px;
  }
  .bubble .label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 4px;
    color: var(--text-dim);
  }
  .user .bubble .label { color: var(--primary-light); text-align: right; }

  /* Typing indicator */
  .typing {
    display: none; padding: 12px 16px; align-items: center; gap: 8px;
    margin-bottom: 12px; align-self: flex-start;
  }
  .typing.active { display: flex; }
  .typing .dots { display: flex; gap: 4px; }
  .typing .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--primary); animation: bounce 1.4s ease-in-out infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  /* Mic area */
  .mic-area {
    padding: 12px 20px 24px; text-align: center;
    flex-shrink: 0;
  }
  .mic-btn {
    width: 72px; height: 72px; border-radius: 50%;
    border: none; cursor: pointer; position: relative;
    background: linear-gradient(135deg, var(--primary), #6d28d9);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-tap-highlight-color: transparent;
    margin: 0 auto;
  }
  .mic-btn:active { transform: scale(0.92); }
  .mic-btn.active {
    background: #dc2626;
    box-shadow: 0 0 40px rgba(220,38,38,0.4);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .mic-btn.listening {
    background: #059669;
    box-shadow: 0 0 40px rgba(5,150,105,0.4);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(220,38,38,0.4); }
    50% { box-shadow: 0 0 60px rgba(220,38,38,0.6); }
  }

  .mic-btn svg {
    width: 32px; height: 32px; fill: white; display: block; margin: 0 auto;
  }

  .mic-label {
    font-size: 13px; color: var(--text-dim); margin-top: 10px;
    transition: color 0.3s;
  }
  .mic-label.active { color: #34d399; }
  .mic-label.speaking { color: #fbbf24; }

  /* Controls row */
  .controls {
    display: flex; justify-content: center; gap: 12px;
    margin-top: 8px;
  }
  .ctrl-btn {
    padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
    background: var(--surface); color: var(--text-dim);
    font-size: 12px; cursor: pointer; transition: all 0.2s;
    font-family: var(--font);
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.on {
    background: rgba(124,58,237,0.2); border-color: var(--primary); color: var(--primary-light);
  }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; padding: 40px; text-align: center;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; color: var(--text-dim); line-height: 1.5; max-width: 280px; }
  .empty-state .hint { margin-top: 16px; display: flex; gap: 24px; }
  .empty-state .hint-item { text-align: center; }
  .empty-state .hint-item .key { font-size: 24px; margin-bottom: 4px; }
  .empty-state .hint-item .desc { font-size: 11px; color: var(--text-dim); }

  .hidden { display: none !important; }
  .clear-btn {
    padding: 4px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
    background: transparent; color: var(--text-dim); font-size: 11px;
    cursor: pointer; position: absolute; right: 20px; top: 20px;
    font-family: var(--font);
  }

  /* Sound wave visualization */
  .wave-container {
    display: flex; align-items: center; justify-content: center;
    height: 40px; gap: 2px; margin-top: 4px;
  }
  .wave-bar {
    width: 3px; border-radius: 2px;
    background: var(--primary); opacity: 0.6;
    transition: height 0.1s ease;
  }
  .wave-bar.active { background: #34d399; }
</style>
</head>
<body>
<div class="app">
  <div class="bg-glow"></div>

  <div class="header">
    <button class="clear-btn" id="clearBtn">Clear</button>
    <h1>🚀 Nova Voice</h1>
    <div class="status" id="status">Tap the mic to start</div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="icon">🎙️</div>
      <h2>Talk to Nova</h2>
      <p>I'm your hands-free AI assistant. Just speak — I'll listen and respond.</p>
      <div class="hint">
        <div class="hint-item">
          <div class="key">👆</div>
          <div class="desc">Tap mic to speak</div>
        </div>
        <div class="hint-item">
          <div class="key">🔄</div>
          <div class="desc">Auto mode listens</div>
        </div>
        <div class="hint-item">
          <div class="key">🔊</div>
          <div class="desc">I speak back</div>
        </div>
      </div>
    </div>
  </div>

  <div class="mic-area">
    <div class="wave-container" id="waveContainer"></div>
    <button class="mic-btn" id="micBtn" aria-label="Tap to speak">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <div class="mic-label" id="micLabel">Tap to speak</div>
    <div class="controls">
      <button class="ctrl-btn" id="autoBtn">🔄 Auto</button>
      <button class="ctrl-btn" id="voiceBtn">🔊 Voice</button>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────
const STATE = {
  listening: false,
  speaking: false,
  thinking: false,
  autoMode: false,
  voiceOutput: true,
  messages: [],
  transcript: '',
  fullResponse: '',
  recognition: null,
  synth: window.speechSynthesis,
  utterance: null,
  abortController: null,
  sessionId: 'nova-' + Date.now(),
};

// ─── DOM refs ───────────────────────────────────────
const $ = (s) => document.querySelector(s);
const el = {
  micBtn: $('#micBtn'),
  micLabel: $('#micLabel'),
  status: $('#status'),
  messages: $('#messages'),
  emptyState: $('#emptyState'),
  autoBtn: $('#autoBtn'),
  voiceBtn: $('#voiceBtn'),
  clearBtn: $('#clearBtn'),
  waveContainer: $('#waveContainer'),
};

// ─── Waves ──────────────────────────────────────────
function initWaves() {
  el.waveContainer.innerHTML = '';
  for (let i = 0; i < 32; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    el.waveContainer.appendChild(bar);
  }
}
initWaves();

function updateWaves(volume) {
  const bars = el.waveContainer.querySelectorAll('.wave-bar');
  const h = Math.min(40, Math.max(2, volume * 2 + 2));
  bars.forEach((b, i) => {
    const v = Math.sin(Date.now() / 200 + i * 0.5) * 0.3 + 0.7;
    const bh = h * v;
    b.style.height = bh + 'px';
    b.classList.toggle('active', STATE.listening);
  });
}

// ─── Speech Recognition ────────────────────────────
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    el.status.textContent = '❌ Speech recognition not supported';
    el.micBtn.style.display = 'none';
    return;
  }
  STATE.recognition = new SR();
  STATE.recognition.continuous = true;
  STATE.recognition.interimResults = true;
  STATE.recognition.lang = 'en-US';

  STATE.recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    STATE.transcript = final || interim;
    el.micLabel.textContent = interim ? '🎤 ' + interim : 'Listening...';
  };

  STATE.recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'aborted') return;
    console.error('SR error:', e.error);
    stopListening();
    el.micLabel.textContent = '⚠️ ' + e.error;
    setTimeout(() => updateMicUI(false), 2000);
  };

  STATE.recognition.onend = () => {
    if (STATE.listening) {
      // If still supposed to be listening, handle the transcript
      if (STATE.transcript.trim()) {
        sendMessage(STATE.transcript.trim());
      }
      STATE.transcript = '';
      if (STATE.autoMode && !STATE.speaking) {
        // Restart in auto mode after a pause
        setTimeout(() => { if (STATE.autoMode) startListening(); }, 500);
      } else if (STATE.listening) {
        // Manual mode: just restart listening
        startListening();
      }
    }
  };
}

// ─── Mic control ────────────────────────────────────
function startListening() {
  if (STATE.listening) return;
  try {
    STATE.recognition.start();
    STATE.listening = true;
    updateMicUI(true);
    el.status.textContent = STATE.autoMode ? '🎤 Listening...' : '🎤 Speak...';
    el.status.className = 'status listening';
  } catch (e) {
    console.error('SR start error:', e);
  }
}

function stopListening() {
  if (!STATE.listening) return;
  try {
    STATE.recognition.stop();
  } catch (e) { /* ignore */ }
  STATE.listening = false;
  if (!STATE.speaking && !STATE.thinking) {
    updateMicUI(false);
  }
}

function toggleListening() {
  if (STATE.listening) {
    // If we have a transcript, send it
    const t = STATE.transcript.trim();
    stopListening();
    STATE.transcript = '';
    if (t) sendMessage(t);
    else updateMicUI(false);
  } else {
    STATE.transcript = '';
    startListening();
  }
}

function updateMicUI(on) {
  el.micBtn.classList.toggle('listening', on && !STATE.speaking);
  el.micBtn.classList.toggle('active', on && !STATE.speaking);
  if (!on && !STATE.speaking) {
    el.micLabel.textContent = 'Tap to speak';
    el.micBtn.classList.remove('listening', 'active');
  }
}

// ─── TTS ────────────────────────────────────────────
function speakText(text) {
  if (!STATE.voiceOutput) return Promise.resolve();
  return new Promise((resolve) => {
    el.synth.cancel();
    const clean = text.replace(/[*_~`#]/g, '').replace(/\[.*?\]\(.*?\)/g, '$1').replace(/https?:\/\/\S+/g, '').substring(0, 4000);
    
    // Ensure synth is not paused (iOS quirk)
    if (el.synth.paused) el.synth.resume();

    STATE.utterance = new SpeechSynthesisUtterance(clean);
    STATE.utterance.rate = 0.95;  // Slightly slower for clarity
    STATE.utterance.pitch = 1.0;
    STATE.utterance.volume = 1.0;

    // Wait for voices to be available (important on mobile)
    let attempts = 0;
    function trySpeak() {
      const voices = el.synth.getVoices();
      if (voices.length === 0 && attempts < 20) {
        attempts++;
        setTimeout(trySpeak, 250);
        return;
      }
      // Pick a good voice
      const preferred = voices.find(v => 
        v.lang.startsWith('en') && 
        (v.name.includes('Google UK') || v.name.includes('Samantha') || 
         v.name.includes('Microsoft Zira') || v.name.includes('Female')));
      STATE.utterance.voice = preferred || voices.find(v => v.lang.startsWith('en')) || null;

      STATE.speaking = true;
      el.status.textContent = '🔊 Speaking...';
      el.status.className = 'status speaking';

      STATE.utterance.onend = () => {
        STATE.speaking = false;
        updateMicUI(STATE.listening);
        el.status.textContent = STATE.autoMode ? '🎤 Listening...' : 'Tap to speak';
        el.status.className = STATE.autoMode ? 'status listening' : '';
        if (STATE.autoMode && !STATE.listening) {
          setTimeout(() => startListening(), 300);
        }
        resolve();
      };
      STATE.utterance.onerror = (e) => {
        console.warn('TTS error:', e.error || 'unknown');
        STATE.speaking = false;
        updateMicUI(false);
        resolve();
      };
      el.synth.speak(STATE.utterance);
    }
    trySpeak();
  });
}

// ─── API Call ──────────────────────────────────────
async function sendMessage(text) {
  STATE.thinking = true;
  el.status.textContent = '💭 Thinking...';
  el.status.className = 'status thinking';
  addMessage(text, 'user');
  STATE.messages.push({ role: 'user', content: text });
  showTyping();

  try {
    STATE.abortController = new AbortController();
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        history: STATE.messages.slice(-20),
        session_id: STATE.sessionId,
      }),
      signal: STATE.abortController.signal,
    });

    hideTyping();

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(err || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const reply = data.reply || 'Sorry, I didn\'t catch that.';

    STATE.messages.push({ role: 'assistant', content: reply });
    addMessage(reply, 'nova');
    STATE.thinking = false;
    el.status.textContent = '🔊 Speaking...';
    el.status.className = 'status speaking';
    await speakText(reply);

  } catch (e) {
    hideTyping();
    STATE.thinking = false;
    if (e.name === 'AbortError') return;
    console.error('API error:', e);
    const errMsg = '⚠️ Connection error. Check your network.';
    addMessage(errMsg, 'nova');
    STATE.messages.push({ role: 'assistant', content: errMsg });
  }

  STATE.thinking = false;
  if (STATE.autoMode && !STATE.listening && !STATE.speaking) {
    startListening();
  }
}

// ─── UI helpers ─────────────────────────────────────
function addMessage(text, role) {
  el.emptyState.classList.add('hidden');

  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'You' : 'Nova';
  bubble.appendChild(label);

  const p = document.createElement('div');
  p.textContent = text;
  bubble.appendChild(p);

  div.appendChild(bubble);
  el.messages.appendChild(div);
  el.messages.scrollTop = el.messages.scrollHeight;
}

function showTyping() {
  const t = document.querySelector('.typing');
  if (t) { t.classList.add('active'); return; }
  const div = document.createElement('div');
  div.className = 'msg nova typing active';
  div.innerHTML = '<div class="bubble"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  el.messages.appendChild(div);
  el.messages.scrollTop = el.messages.scrollHeight;
}

function hideTyping() {
  const t = document.querySelector('.typing');
  if (t) t.classList.remove('active');
}

function clearConversation() {
  STATE.messages = [];
  STATE.sessionId = 'nova-' + Date.now();
  el.messages.querySelectorAll('.msg').forEach(m => m.remove());
  el.emptyState.classList.remove('hidden');
  el.synth.cancel();
  STATE.speaking = false;
  updateMicUI(false);
  el.status.textContent = 'Tap the mic to start';
  el.status.className = 'status';
}

// ─── Controls ───────────────────────────────────────
el.micBtn.addEventListener('click', toggleListening);

el.autoBtn.addEventListener('click', () => {
  STATE.autoMode = !STATE.autoMode;
  el.autoBtn.classList.toggle('on', STATE.autoMode);
  if (STATE.autoMode && !STATE.listening && !STATE.speaking) {
    startListening();
  }
  if (STATE.autoMode) {
    el.micLabel.textContent = '🔄 Auto mode';
  } else {
    el.micLabel.textContent = 'Tap to speak';
    stopListening();
  }
});

el.voiceBtn.addEventListener('click', () => {
  STATE.voiceOutput = !STATE.voiceOutput;
  el.voiceBtn.classList.toggle('on', STATE.voiceOutput);
  if (!STATE.voiceOutput) {
    el.synth.cancel();
    STATE.speaking = false;
  }
});

el.clearBtn.addEventListener('click', clearConversation);

// ─── Wave animation loop ────────────────────────────
function waveLoop() {
  if (STATE.listening) {
    // Simulate volume based on listening state
    const v = Math.sin(Date.now() / 300) * 0.3 + Math.random() * 0.5 + 0.3;
    updateWaves(v * 20);
  } else if (STATE.speaking) {
    const v = Math.sin(Date.now() / 150) * 0.4 + 0.5;
    updateWaves(v * 18);
  } else {
    updateWaves(2);
  }
  requestAnimationFrame(waveLoop);
}
waveLoop();

// ─── Init ───────────────────────────────────────────
initSpeech();

// Preload voices
if (STATE.synth) {
  STATE.synth.getVoices(); // Trigger async load
  STATE.synth.onvoiceschanged = () => STATE.synth.getVoices();
}

// Auto-start in auto mode
setTimeout(() => {
  if (!STATE.speaking) {
    STATE.autoMode = true;
    el.autoBtn.classList.add('on');
    startListening();
    el.micLabel.textContent = '🔄 Auto mode';
  }
}, 500);
</script>
</body>
</html>
